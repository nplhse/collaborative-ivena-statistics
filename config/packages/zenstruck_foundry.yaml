when@dev:
    # See full configuration: https://symfony.com/bundles/ZenstruckFoundryBundle/current/index.html#full-default-bundle-configuration
    zenstruck_foundry:
        enable_auto_refresh_with_lazy_objects: true
        orm:
            reset:
                mode: schema
        persistence:
            # Flush only once per call of `PersistentObjectFactory::create()`
            flush_once: true

        faker:
            locale: de_DE

when@test:
    zenstruck_foundry:
        enable_auto_refresh_with_lazy_objects: true
        orm:
            reset:
                # Align test schema with migrations (incl. materialized views); DAMA rolls back per test.
                mode: migrate
        persistence:
            flush_once: true

        faker:
            locale: de_DE
