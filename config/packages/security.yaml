security:
    expose_security_errors: none
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\User\Domain\Entity\User
                property: username
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            entry_point: App\User\Infrastructure\Security\AuthenticationEntryPoint
            custom_authenticators:
                - App\User\Infrastructure\Security\LoginFormAuthenticator
                - App\User\Infrastructure\Security\ConfirmPasswordAuthenticator
            user_checker: App\User\Infrastructure\Security\UserAccountStatusChecker

            # Limits failed login attempts per IP + username (Symfony default key).
            # 5 attempts / 15 minutes balances brute-force protection with typo tolerance.
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

            logout:
                path: app_logout
                target: app_default

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                # by default, the feature is enabled by checking a checkbox in the
                # login form, uncomment the following line to always enable it.
                #always_remember_me: true

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            switch_user:
                role: ROLE_ADMIN
                target_route: app_default

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/_error_preview, roles: PUBLIC_ACCESS }
        - { path: ^/_error/, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/hospitals, roles: ROLE_PARTICIPANT }
        - { path: ^/explore/indication/raw/assign, roles: ROLE_ADMIN }
        - { path: ^/explore, roles: ROLE_PARTICIPANT }
        - { path: ^/statistics, roles: ROLE_USER }
        - { path: ^/login/confirm, roles: IS_AUTHENTICATED_REMEMBERED }
        # - { path: ^/profile, roles: ROLE_USER }

    role_hierarchy:
        ROLE_ADMIN: ROLE_PARTICIPANT

when@test:
    security:
        firewalls:
            main:
                remember_me:
                    always_remember_me: true
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
