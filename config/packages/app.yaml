parameters:
    app.default.title: 'Collaborative IVENA statistics'

app:
    title: '%env(default:app.default.title:APP_TITLE)%'
    short_title: 'COIS'
    blog:
        title: 'Our Blog'
        description: 'Updates, Backgrounds and News about Collaborative IVENA Statistics.'

    default_locale: 'en'

    import:
        reject_writer: 'db'
        csv_reject_dir: 'var/import_rejects'
    meta:
        copyright_start_year: 2025
        hoster:
            name: 'Uberspace'
            url: 'https://uberspace.de'

    feedback:
        spam:
            min_submission_seconds: 4
            long_message_threshold: 1800
            anonymous_threshold: 6
            authenticated_threshold: 8
            authenticated_score_bonus: 2
            keywords: ['casino', 'crypto', 'loan', 'viagra', 'seo', 'backlink', 'guest post']
