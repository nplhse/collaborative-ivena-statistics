doctrine:
    dbal:
        default_connection: default
        connections:
            default:
                # IMPORTANT: You MUST configure your server version,
                # either here or in the DATABASE_URL env var (see .env file)
                server_version: '16'
                url: '%env(resolve:DATABASE_URL)%'
                profiling_collect_backtrace: '%kernel.debug%'
                use_savepoints: true

    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            Allocation:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Allocation/Domain/Entity'
                prefix: 'App\Allocation\Domain\Entity'
            Content:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Content/Domain/Entity'
                prefix: 'App\Content\Domain\Entity'
            Import:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Import/Domain/Entity'
                prefix: 'App\Import\Domain\Entity'
            User:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/User/Domain/Entity'
                prefix: 'App\User\Domain\Entity'
            Feedback:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Feedback/Domain/Entity'
                prefix: 'App\Feedback\Domain\Entity'
            Shared:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Shared/Domain/Entity'
                prefix: 'App\Shared\Domain\Entity'
            SharedAudit:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Shared/Infrastructure/Audit/Entity'
                prefix: 'App\Shared\Infrastructure\Audit\Entity'
            Statistics:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Statistics/Infrastructure/Entity'
                prefix: 'App\Statistics\Infrastructure\Entity'
        controller_resolver:
            auto_mapping: false
        schema_ignore_classes:
            - App\Statistics\Infrastructure\Entity\ProjectionStateHospitalCount
            - App\Statistics\Infrastructure\Entity\ProjectionDispatchAreaHospitalCount
            - App\Statistics\Infrastructure\Entity\ProjectionHospitalDimension

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
