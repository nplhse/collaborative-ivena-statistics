framework:
    rate_limiter:
        verify_email_resend:
            policy: fixed_window
            limit: 3
            interval: '15 minutes'
        explore_list:
            policy: fixed_window
            limit: 100
            interval: '10 minutes'
        feedback_submit:
            policy: fixed_window
            limit: 5
            interval: '1 hour'
        feedback_submit_anonymous_ip:
            policy: fixed_window
            limit: 4
            interval: '1 hour'
        feedback_submit_anonymous_email:
            policy: fixed_window
            limit: 3
            interval: '1 hour'

when@test:
