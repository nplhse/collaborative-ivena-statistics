        rate_limiter:
            explore_list:
                policy: fixed_window
                limit: 3
                interval: '15 minutes'
            feedback_submit:
                policy: fixed_window
                limit: 10000
                interval: '1 second'
            feedback_submit_anonymous_ip:
                policy: fixed_window
                limit: 10000
                interval: '1 second'
            feedback_submit_anonymous_email:
                policy: fixed_window
                limit: 10000
                interval: '1 second'
