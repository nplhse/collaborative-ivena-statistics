# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

imports:
    - { resource: services/foundry.yaml }
    - { resource: services/foundry_test.yaml }
    - { resource: services/dev/doctrine_fixtures.yaml }

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.imports_max_size: '15M'
    app.imports_base_dir: '%kernel.project_dir%/var/imports'
    app.media_max_size: '10M'
    app.media_upload_dir: '%kernel.project_dir%/public/uploads/media'
    app.page_content_width_estimate: 800
    app.rejects_base_dir: '%kernel.project_dir%/var/imports/rejects'
    env(APP_URL): ''
    env(MAILER_FROM): 'no-reply@localhost'
    env(MAILER_REPLY_TO): ''
    app.mailer_from: '%env(MAILER_FROM)%'
    app.mailer_reply_to: '%env(MAILER_REPLY_TO)%'
    env(SENTRY_DSN): ''
    env(SENTRY_CSP_REPORT_URI): ''
    env(SENTRY_TRACES_SAMPLE_RATE): '0'
    env(SENTRY_ENABLE_LOGS): 'true'
    env(APP_ADMIN_STORAGE_LIMIT_BYTES): '0'
    app.admin.storage_limit_bytes: '%env(int:APP_ADMIN_STORAGE_LIMIT_BYTES)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - 'DataFixtures/'
            - '**/Infrastructure/Factory'
            - '**/Infrastructure/Faker'
            - 'User/Domain/Factory'

    app.lock.pdo:
        class: PDO
        factory: ['@doctrine.dbal.default_connection', 'getNativeConnection']

    app.lock.store:
        class: Symfony\Component\Lock\Store\PdoStore
        arguments:
            - '@app.lock.pdo'
            - { useAdvisoryLocks: true }

    app.lock.factory:
        class: Symfony\Component\Lock\LockFactory
        arguments: ['@app.lock.store']

    Symfony\Component\Lock\LockFactory: '@app.lock.factory'

    sentry.callback.before_send:
        class: App\Shared\Infrastructure\Monitoring\Sentry\SentryBeforeSendCallback
        factory: ['@App\Shared\Infrastructure\Monitoring\Sentry\SentryBeforeSendCallback', 'getBeforeSend']

    sentry.callback.before_send_transaction:
        class: App\Shared\Infrastructure\Monitoring\Sentry\SentryBeforeSendCallback
        factory: ['@App\Shared\Infrastructure\Monitoring\Sentry\SentryBeforeSendCallback', 'getBeforeSendTransaction']

    sentry.callback.before_breadcrumb:
        class: App\Shared\Infrastructure\Monitoring\Sentry\SentryBeforeSendCallback
        factory: ['@App\Shared\Infrastructure\Monitoring\Sentry\SentryBeforeSendCallback', 'getBeforeBreadcrumb']

    sentry.callback.before_send_log:
        class: App\Shared\Infrastructure\Monitoring\Sentry\SentryBeforeSendCallback
        factory: ['@App\Shared\Infrastructure\Monitoring\Sentry\SentryBeforeSendCallback', 'getBeforeSendLog']

    app.monolog.sentry_logs_import:
        class: Sentry\SentryBundle\Monolog\LogsHandler
        arguments:
            - !php/const Monolog\Logger::INFO

    app.monolog.sentry_logs_main:
        class: Sentry\SentryBundle\Monolog\LogsHandler
        arguments:
            - !php/const Monolog\Logger::WARNING

when@test:
    services:
        app.lock.store:
            class: Symfony\Component\Lock\Store\FlockStore
            arguments:
                - '%kernel.cache_dir%/lock'
