name: Testsuite

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    unit:
        name: Unit (PHP ${{ matrix.php-version }})
        runs-on: ubuntu-latest
        env:
            APP_SECRET: ci-test-placeholder-not-for-production
        strategy:
            fail-fast: true
            matrix:
                php-version: ['8.4']

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install PHP with extensions
              uses: shivammathur/setup-php@v2
              with:
                  extensions: "intl, mbstring, zip"
                  php-version: ${{ matrix.php-version }}
                  tools: composer:v2

            - name: Set composer cache directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
              shell: bash

            - name: Cache composer
              uses: actions/cache@v5
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install dependencies
              run: composer install --ansi --no-interaction --no-progress

            - name: Execute unit tests via ParaTest
              run: vendor/bin/paratest --testsuite unit --processes=4 --order-by duration --stop-on-failure

    database:
        name: Database tests (PHP ${{ matrix.php-version }})
        runs-on: ubuntu-latest
        env:
            APP_SECRET: ci-test-placeholder-not-for-production
        services:
            postgres:
                image: postgres:16
                ports:
                    - 5432:5432
                env:
                    POSTGRES_DB: app
                    POSTGRES_USER: app
                    POSTGRES_PASSWORD: password
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        strategy:
            fail-fast: true
            matrix:
                php-version: ['8.4']

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install PHP with extensions
              uses: shivammathur/setup-php@v2
              with:
                  coverage: xdebug
                  extensions: "intl, mbstring, pdo_pgsql, zip"
                  php-version: ${{ matrix.php-version }}
                  tools: composer:v2

            - name: Set composer cache directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
              shell: bash

            - name: Cache composer
              uses: actions/cache@v5
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install dependencies
              run: composer install --ansi --no-interaction --no-progress

            - name: Build and compile assets
              run: |
                  php bin/console importmap:install
                  php bin/console asset-map:compile

            - name: Execute database-backed tests via ParaTest
              run: |
                  vendor/bin/paratest --testsuite all --exclude-testsuite unit --processes=4 --log-junit junit.xml --order-by duration --stop-on-failure
                  php bin/report-slowest-tests 10 || true
              env:
                  DATABASE_URL: postgres://app:password@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/app
                  XDEBUG_MODE: coverage

            - name: Upload coverage reports to Codecov
              if: success()
              uses: codecov/codecov-action@v6
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

            - name: Upload test results to Codecov
              if: success()
              uses: codecov/test-results-action@v1
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
