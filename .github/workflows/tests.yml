name: Testsuite

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    prod-smoke:
        name: Prod kernel smoke
        runs-on: ubuntu-latest
        env:
            APP_ENV: prod
            APP_DEBUG: 0
            APP_SECRET: ci-test-placeholder-not-for-production
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Install PHP with extensions
              uses: shivammathur/setup-php@v2
              with:
                  extensions: "intl, mbstring, zip"
                  php-version: '8.4'
                  tools: composer:v2

            - name: Set composer cache directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
              shell: bash

            - name: Cache composer
              uses: actions/cache@v6
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-prod-${{ hashFiles('composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-prod-

            - name: Install production dependencies
              run: composer install --no-dev --no-interaction --no-progress

    unit:
        name: Unit (PHP ${{ matrix.php-version }})
        runs-on: ubuntu-latest
        env:
            APP_SECRET: ci-test-placeholder-not-for-production
        strategy:
            fail-fast: true
            matrix:
                php-version: ['8.4']

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Install PHP with extensions
              uses: shivammathur/setup-php@v2
              with:
                  coverage: pcov
                  extensions: "intl, mbstring, zip"
                  php-version: ${{ matrix.php-version }}
                  tools: composer:v2

            - name: Set composer cache directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
              shell: bash

            - name: Cache composer
              uses: actions/cache@v6
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install dependencies
              run: composer install --ansi --no-interaction --no-progress

            - name: Execute unit tests via ParaTest
              run: |
                  mkdir -p var/coverage/logs
                  vendor/bin/paratest \
                    --testsuite unit \
                    --processes=4 \
                    --coverage-clover=var/coverage/logs/clover-unit.xml \
                    --log-junit=junit-unit.xml \
                    --order-by duration \
                    --stop-on-failure

            - name: Upload unit coverage artifact
              if: success()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-unit
                  path: var/coverage/logs/clover-unit.xml
                  if-no-files-found: error

            - name: Upload unit test results to Codecov
              if: success()
              uses: codecov/codecov-action@v7
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  report_type: test_results
                  files: junit-unit.xml
                  name: unit-test-results
                  disable_search: true
                  fail_ci_if_error: false

    database:
        name: Database tests (PHP ${{ matrix.php-version }})
        runs-on: ubuntu-latest
        env:
            APP_SECRET: ci-test-placeholder-not-for-production
            SYMFONY_DEPRECATIONS_HELPER: 'max[total]=0&verbose=1'
        services:
            postgres:
                image: postgres:16
                ports:
                    - 5432:5432
                env:
                    POSTGRES_DB: app
                    POSTGRES_USER: app
                    POSTGRES_PASSWORD: password
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        strategy:
            fail-fast: true
            matrix:
                php-version: ['8.4']

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Install PHP with extensions
              uses: shivammathur/setup-php@v2
              with:
                  coverage: pcov
                  extensions: "intl, mbstring, pdo_pgsql, zip"
                  php-version: ${{ matrix.php-version }}
                  tools: composer:v2

            - name: Set composer cache directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
              shell: bash

            - name: Cache composer
              uses: actions/cache@v6
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install dependencies
              run: composer install --ansi --no-interaction --no-progress

            - name: Build and compile assets
              run: |
                  php bin/console importmap:install
                  php bin/console asset-map:compile

            - name: Warm test cache
              run: php bin/console cache:warmup --env=test

            - name: Execute database-backed tests via ParaTest
              run: |
                  mkdir -p var/coverage/logs
                  vendor/bin/paratest \
                    --testsuite all \
                    --exclude-testsuite unit \
                    --processes=4 \
                    --coverage-clover=var/coverage/logs/clover-integration.xml \
                    --log-junit=junit-integration.xml \
                    --order-by duration \
                    --stop-on-failure
                  php bin/report-slowest-tests 10 || true
              env:
                  DATABASE_URL: postgres://app:password@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/app

            - name: Upload integration coverage artifact
              if: success()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-integration
                  path: var/coverage/logs/clover-integration.xml
                  if-no-files-found: error

            - name: Upload integration test results to Codecov
              if: success()
              uses: codecov/codecov-action@v7
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  report_type: test_results
                  files: junit-integration.xml
                  name: integration-test-results
                  disable_search: true
                  fail_ci_if_error: false

    # Single unflagged coverage upload (unit + integration clovers).
    # Dual per-job flagged uploads since #346 stayed stuck in Codecov "started".
    coverage:
        name: Upload coverage to Codecov
        needs: [unit, database]
        runs-on: ubuntu-latest
        if: success()
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Download unit coverage
              uses: actions/download-artifact@v4
              with:
                  name: coverage-unit
                  path: var/coverage/logs

            - name: Download integration coverage
              uses: actions/download-artifact@v4
              with:
                  name: coverage-integration
                  path: var/coverage/logs

            - name: Upload combined coverage to Codecov
              uses: codecov/codecov-action@v7
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: var/coverage/logs/clover-unit.xml,var/coverage/logs/clover-integration.xml
                  name: unit-and-integration
                  disable_search: true
                  fail_ci_if_error: true
                  verbose: true
