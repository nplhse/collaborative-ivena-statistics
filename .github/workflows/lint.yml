name: "Linting"

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    linters:
        name: Linters
        runs-on: ubuntu-latest
        env:
            # Required for Symfony console/PHPStan (no .env.local in CI). Not a production secret.
            APP_SECRET: ci-lint-placeholder-not-for-production
            # PHPStan boots Doctrine via tests/object-manager.php; CI has no PostgreSQL service.
            DATABASE_URL: 'sqlite:///${{ github.workspace }}/var/lint.db'
            MESSENGER_TRANSPORT_DSN: sync://
            SYMFONY_DEPRECATIONS_HELPER: 'max[total]=0&verbose=1'
        strategy:
            fail-fast: true
            matrix:
                php-version: ['8.4']

        steps:
            - name: "Checkout code"
              uses: actions/checkout@v6

            - name: "Install PHP with extensions"
              uses: shivammathur/setup-php@v2
              with:
                  coverage: "none"
                  extensions: intl, pdo_sqlite
                  php-version: ${{ matrix.php-version }}
                  tools: composer:v2

            - name: "Set composer cache directory"
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            - name: "Cache composer"
              uses: actions/cache@v5
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: "Install dependencies"
              run: composer install --ansi --no-interaction --no-progress

            - name: Lint YAML files
              run: ./bin/console lint:yaml config --parse-tags

            - name: Lint Twig templates
              run: ./bin/console lint:twig templates --env=prod

            - name: Lint XLIFF translation files
              run: ./bin/console lint:xliff translations

            - name: Lint translation contents
              run: ./bin/console lint:translations

            - name: Check Symfony deprecations
              run: ./bin/check-deprecations

            - name: Lint Composer config
              run: composer validate --strict

            - name: Check if any dependencies are compromised
              run: composer audit

            - name: Check if rector finds any issues
              run: vendor/bin/rector --dry-run

            - name: Lint PHP Code (PHP-CS-Fixer)
              run: vendor/bin/php-cs-fixer fix --dry-run

            - name: Run PHPStan
              run: ./vendor/bin/phpstan analyze
